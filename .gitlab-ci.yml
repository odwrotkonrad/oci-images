workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - build-image
  - validate
  - release

variables:
  CI_LINUX_IMAGE: $CI_REGISTRY_IMAGE/ci-linux
  DEV_SANDBOX_IMAGE: $CI_REGISTRY_IMAGE/dev-sandbox

#[why] one job per arch: qemu-emulated arm64 in one multi-arch build doubles the wall clock; arm64 jobs are manual, amd64 ci-linux is the only automatic build. arm64 pushes -arm64 suffixed tags (a single-arch push to a shared tag would clobber the other arch's manifest)
.build-image:
  stage: build-image
  image: docker:27-cli
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_CERT_PATH: "/certs/client"
    DOCKER_TLS_VERIFY: "1"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker context create dind --docker "host=$DOCKER_HOST,ca=$DOCKER_CERT_PATH/ca.pem,cert=$DOCKER_CERT_PATH/cert.pem,key=$DOCKER_CERT_PATH/key.pem"
    - docker buildx create --use --driver docker-container dind
    #[why] on a tag pipeline publish the immutable :vX.Y.Z consumers pin; else re-tag :latest as the version slot (harmless no-op)
    - VERSION_TAG="${CI_COMMIT_TAG:-latest}"

build-ci-linux-image-amd64:
  extends: .build-image
  needs: []
  rules:
    - if: $CI_MERGE_REQUEST_DRAFT == "true"
      when: never
    - if: $CI_COMMIT_TAG
    - changes:
        - ci/ci-linux/Dockerfile
        - ci/tool-versions.env
        - ci/terraform-providers.tf
        - ci/terraform.lock.hcl
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - when: manual
      allow_failure: true
  script:
    - docker buildx build
        --file "$CI_PROJECT_DIR/ci/ci-linux/Dockerfile"
        --platform linux/amd64
        --tag "$CI_LINUX_IMAGE:$VERSION_TAG"
        --tag "$CI_LINUX_IMAGE:latest"
        --tag "$CI_LINUX_IMAGE:$CI_COMMIT_SHORT_SHA"
        --cache-from "type=registry,ref=$CI_LINUX_IMAGE-cache"
        --cache-to "type=registry,ref=$CI_LINUX_IMAGE-cache,mode=max"
        --push
        "$CI_PROJECT_DIR"

#[why] qemu on the shared runners is fine for ci-linux (downloads, no compile): keep it there with buildx
build-ci-linux-image-arm64:
  extends: .build-image
  needs: []
  rules:
    - if: $CI_MERGE_REQUEST_DRAFT == "true"
      when: never
    - when: manual
      allow_failure: true
  script:
    - docker buildx build
        --file "$CI_PROJECT_DIR/ci/ci-linux/Dockerfile"
        --platform linux/arm64
        --tag "$CI_LINUX_IMAGE:$VERSION_TAG-arm64"
        --tag "$CI_LINUX_IMAGE:latest-arm64"
        --tag "$CI_LINUX_IMAGE:$CI_COMMIT_SHORT_SHA-arm64"
        --cache-from "type=registry,ref=$CI_LINUX_IMAGE-cache-arm64"
        --cache-to "type=registry,ref=$CI_LINUX_IMAGE-cache-arm64,mode=max"
        --push
        "$CI_PROJECT_DIR"

#[why] the dev-sandbox bake (brew + che sync) is qemu-hostile: run arm64 on the local tart runner, native Apple Silicon linux VM. cirruslabs ubuntu guest, admin/admin ssh, docker installed at job start
.build-image-arm64-local:
  stage: build-image
  tags: [local]
  image: ghcr.io/cirruslabs/ubuntu:latest
  variables:
    TART_EXECUTOR_SSH_USERNAME: admin
    TART_EXECUTOR_SSH_PASSWORD: admin
  rules:
    - if: $CI_MERGE_REQUEST_DRAFT == "true"
      when: never
    - when: manual
      allow_failure: true
  before_script:
    - command -v docker >/dev/null || { sudo apt-get update && sudo apt-get install -y docker.io; }
    - echo "$CI_REGISTRY_PASSWORD" | sudo docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - VERSION_TAG="${CI_COMMIT_TAG:-latest}"

.build-dev-sandbox:
  extends: .build-image
  rules:
    - if: $CI_MERGE_REQUEST_DRAFT == "true"
      when: never
    - when: manual
      allow_failure: true

build-dev-sandbox-image-amd64:
  extends: .build-dev-sandbox
  needs:
    - job: build-ci-linux-image-amd64
      optional: true
  script:
    #[why] no-cache: the clone layer must fetch fresh configs; a cached layer would silently bake a stale checkout
    - docker buildx build
        --no-cache
        --file "$CI_PROJECT_DIR/ci/dev-sandbox/Dockerfile"
        --platform linux/amd64
        --build-arg "BASE_IMAGE=$CI_LINUX_IMAGE:$VERSION_TAG"
        --tag "$DEV_SANDBOX_IMAGE:$VERSION_TAG"
        --tag "$DEV_SANDBOX_IMAGE:latest"
        --tag "$DEV_SANDBOX_IMAGE:$CI_COMMIT_SHORT_SHA"
        --push
        "$CI_PROJECT_DIR"

build-dev-sandbox-image-arm64:
  extends: .build-image-arm64-local
  needs:
    - job: build-ci-linux-image-arm64
      optional: true
  script:
    - sudo docker build
        --file "$CI_PROJECT_DIR/ci/dev-sandbox/Dockerfile"
        --build-arg "BASE_IMAGE=$CI_LINUX_IMAGE:$VERSION_TAG-arm64"
        --tag "$DEV_SANDBOX_IMAGE:$VERSION_TAG-arm64"
        --tag "$DEV_SANDBOX_IMAGE:latest-arm64"
        --tag "$DEV_SANDBOX_IMAGE:$CI_COMMIT_SHORT_SHA-arm64"
        "$CI_PROJECT_DIR"
    - sudo docker push "$DEV_SANDBOX_IMAGE:$VERSION_TAG-arm64"
    - sudo docker push "$DEV_SANDBOX_IMAGE:latest-arm64"
    - sudo docker push "$DEV_SANDBOX_IMAGE:$CI_COMMIT_SHORT_SHA-arm64"

#[why] self-bootstrapping: this repo's own image may not exist yet (chicken/egg), so bootstrap from a minimal debian and fetch the same prebuilt che/lefthook the image bakes (no slow CGO compile of che)
validate-pre-commit-all:
  stage: validate
  needs: []
  image: debian:bookworm-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends make zsh git curl ca-certificates
    - export $(grep -vE '^\s*(#|$)' ci/tool-versions.env | xargs)
    - che_base="https://gitlab.com/api/v4/projects/konradodwrot%2Fgo-modules/packages/generic/che/${CHE_VERSION}"
    - curl -fsSL -o /tmp/che.tar.gz "${che_base}/che_${CHE_VERSION}_linux_amd64.tar.gz"
    - echo "${CHE_SHA256_LINUX_AMD64}  /tmp/che.tar.gz" | sha256sum -c -
    - tar -xz -C /usr/local/bin -f /tmp/che.tar.gz che
    - curl -fsSL -o /usr/local/bin/lefthook "https://github.com/evilmartians/lefthook/releases/download/v${LEFTHOOK_VERSION}/lefthook_${LEFTHOOK_VERSION}_Linux_x86_64"
    - echo "${LEFTHOOK_SHA256_LINUX_AMD64}  /usr/local/bin/lefthook" | sha256sum -c -
    - chmod +x /usr/local/bin/lefthook
    - mkdir -p ~/.config/lefthook
    - '[ -f ~/.config/lefthook/lefthook.yml ] || printf "min_version: 2.1.9\n" > ~/.config/lefthook/lefthook.yml'
  script:
    - make run-repo-ci-precommit-all
    - git diff --exit-code HEAD

#[why] auto-tag vX.Y.Z on main; the tag pipeline rebuilds the image and publishes the immutable :vX.Y.Z consumers pin
release:
  stage: release
  image: $CI_LINUX_IMAGE:latest
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  variables:
    GITLAB_TOKEN: $CI_JOB_TOKEN
  script:
    - NEXT=$(sh ci/next-version.sh)
    - echo "releasing $NEXT"
    - glab release create "$NEXT" --name "oci-images $NEXT" --ref "$CI_COMMIT_SHA" --notes "oci-images $NEXT"
