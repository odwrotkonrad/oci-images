workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - build-image
  - validate
  - release

variables:
  CI_LINUX_IMAGE: $CI_REGISTRY_IMAGE/ci-linux

build-ci-linux-image:
  stage: build-image
  needs: []
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  rules:
    - if: $CI_MERGE_REQUEST_DRAFT == "true"
      when: never
    - if: $CI_COMMIT_TAG
    - changes:
        - ci/Dockerfile
        - ci/tool-versions.env
        - ci/terraform-providers.tf
        - ci/terraform.lock.hcl
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - when: manual
      allow_failure: true
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')\"}}}" >/kaniko/.docker/config.json
    - export $(grep -vE '^\s*(#|$)' ci/tool-versions.env | xargs)
    #[why] on a tag pipeline publish the immutable :vX.Y.Z consumers pin; else re-tag :bookworm as the version slot (harmless no-op)
    - VERSION_TAG="${CI_COMMIT_TAG:-bookworm}"
  script:
    - /kaniko/executor
        --context "$CI_PROJECT_DIR"
        --dockerfile "$CI_PROJECT_DIR/ci/Dockerfile"
        --destination "$CI_LINUX_IMAGE:$VERSION_TAG"
        --destination "$CI_LINUX_IMAGE:bookworm"
        --destination "$CI_LINUX_IMAGE:latest"
        --destination "$CI_LINUX_IMAGE:$CI_COMMIT_SHORT_SHA"
        --build-arg "GO_VERSION=$GO_VERSION"
        --build-arg "GO_SHA256_LINUX_AMD64=$GO_SHA256_LINUX_AMD64"
        --build-arg "CHE_VERSION=$CHE_VERSION"
        --build-arg "CHE_SHA256_LINUX_AMD64=$CHE_SHA256_LINUX_AMD64"
        --build-arg "RENDER_TPL_VERSION=$RENDER_TPL_VERSION"
        --build-arg "RENDER_TPL_SHA256_LINUX_AMD64=$RENDER_TPL_SHA256_LINUX_AMD64"
        --build-arg "LEFTHOOK_VERSION=$LEFTHOOK_VERSION"
        --build-arg "LEFTHOOK_SHA256_LINUX_AMD64=$LEFTHOOK_SHA256_LINUX_AMD64"
        --build-arg "YQ_VERSION=$YQ_VERSION"
        --build-arg "YQ_SHA256_LINUX_AMD64=$YQ_SHA256_LINUX_AMD64"
        --build-arg "ZIG_VERSION=$ZIG_VERSION"
        --build-arg "GORELEASER_VERSION=$GORELEASER_VERSION"
        --build-arg "TERRAFORM_VERSION=$TERRAFORM_VERSION"
        --build-arg "GLAB_VERSION=$GLAB_VERSION"
        --cache=true
        --cache-repo "$CI_LINUX_IMAGE-cache"

#[why] self-bootstrapping: this repo's own image may not exist yet (chicken/egg), so bootstrap from a minimal debian and fetch the same prebuilt che/lefthook the image bakes (no slow CGO compile of che)
validate-pre-commit-all:
  stage: validate
  needs: []
  image: debian:bookworm-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends make zsh git curl ca-certificates
    - export $(grep -vE '^\s*(#|$)' ci/tool-versions.env | xargs)
    - che_base="https://gitlab.com/api/v4/projects/konradodwrot%2Fgo%2Fche/packages/generic/che/${CHE_VERSION}"
    - curl -fsSL -o /tmp/che.tar.gz "${che_base}/che_${CHE_VERSION}_linux_amd64.tar.gz"
    - echo "${CHE_SHA256_LINUX_AMD64}  /tmp/che.tar.gz" | sha256sum -c -
    - tar -xz -C /usr/local/bin -f /tmp/che.tar.gz che
    - curl -fsSL -o /usr/local/bin/lefthook "https://github.com/evilmartians/lefthook/releases/download/v${LEFTHOOK_VERSION}/lefthook_${LEFTHOOK_VERSION}_Linux_x86_64"
    - echo "${LEFTHOOK_SHA256_LINUX_AMD64}  /usr/local/bin/lefthook" | sha256sum -c -
    - chmod +x /usr/local/bin/lefthook
    - mkdir -p ~/.config/lefthook
    - '[ -f ~/.config/lefthook/lefthook.yml ] || printf "min_version: 2.1.9\n" > ~/.config/lefthook/lefthook.yml'
  script:
    - make run-repo-ci-precommit-all
    - git diff --exit-code HEAD

#[why] auto-tag vX.Y.Z on main; the tag pipeline rebuilds the image and publishes the immutable :vX.Y.Z consumers pin
release:
  stage: release
  image: $CI_LINUX_IMAGE:bookworm
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  variables:
    GITLAB_TOKEN: $CI_JOB_TOKEN
  script:
    - NEXT=$(sh ci/next-version.sh)
    - echo "releasing $NEXT"
    - glab release create "$NEXT" --name "ci-images $NEXT" --ref "$CI_COMMIT_SHA" --notes "ci-images $NEXT"
