# yaml-language-server: $schema=https://gitlab.com/konradodwrot/go/che/-/raw/main/assets/data/che.schema.json
##[>] 🤖🤖
ontoRepo:
  options: {autoExec: true}
  include:
    renderTemplates:
      - files:
          - source: templates/2-data/makefile-agents.md.ontoRepo.tpl
            dest:
              - {path: assets/data/makefile.agents.md}
          - source: templates/2-data/repo-structure.md.ontoRepo.tpl
            dest:
              - {path: assets/data/repo-structure.md}
          - source: templates/2-data/terraform-providers.tf.ontoRepo.tpl
            dest:
              - {path: ci/terraform-providers.tf}
          - source: templates/2-data/terraform.lock.hcl.ontoRepo.tpl
            dest:
              - {path: ci/terraform.lock.hcl}
          - source: templates/3-audience/AGENTS.md.ontoRepo.tpl
            dest:
              - {path: CLAUDE.md}
              - {path: AGENTS.md, options: {renderReferencedFiles: true}}
          - source: templates/3-audience/README.md.ontoRepo.tpl
            dest:
              - {path: README.md}
##[<] 🤖🤖
