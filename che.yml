# yaml-language-server: $schema=https://gitlab.com/konradodwrot/go-modules/-/raw/main/che/assets/data/che.schema.json
##[>] 🤖🤖
ontoRepo:
  options: {autoDiscover: true}
  include:
    renderTemplates:
      - templates:
          - source: templates/2-data/makefile-agents.md.ontoRepo.tpl
            dest:
              - {path: assets/data/makefile.agents.md}
          - source: templates/2-data/repo-structure.md.ontoRepo.tpl
            dest:
              - {path: assets/data/repo-structure.md}
          - source: templates/2-data/terraform-providers.tf.ontoRepo.tpl
            dest:
              - {path: ci/terraform-providers.tf}
          - source: templates/2-data/terraform.lock.hcl.ontoRepo.tpl
            dest:
              - {path: ci/terraform.lock.hcl}
          - source: templates/3-audience/AGENTS.md.ontoRepo.tpl
            dest:
              - {path: CLAUDE.md}
              - {path: AGENTS.md, options: {renderReferencedFiles: true}}
          - source: templates/3-audience/README.md.ontoRepo.tpl
            dest:
              - {path: README.md}

claude-agents:
  options: {autoDiscover: true, execIf: ['builtin:isVirt']}
  include:
    renderTemplates:
      - ctx: {repo: OciImages}
        options: {skipAutoGeneratedHeader: true}
        templates:
          - {source: "@gitlab.com/konradodwrot/configs//templates/agents/snippets/ro.md", dest: [.claude/agents/ro.md]}
          - {source: "@gitlab.com/konradodwrot/configs//templates/agents/snippets/rw.md", dest: [.claude/agents/rw.md]}
          - {source: "@gitlab.com/konradodwrot/configs//templates/agents/snippets/settings.json", dest: [.claude/settings.json]}
          - {source: "@gitlab.com/konradodwrot/configs//templates/agents/snippets/claude-gitignore", dest: [{path: .claude/.gitignore, options: {skipAutoGeneratedHeader: false}}]}
##[<] 🤖🤖
